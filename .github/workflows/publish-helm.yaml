name: Publish Helm Charts

on:
  push:
    branches:
      - main
    paths:
      - 'mychart/**'
      - 'Chart.yaml'
      - 'values.yaml'
      - '.github/workflows/publish-helm.yaml'
      - '*.tgz'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Package Helm chart
        run: |
          # Remove old packages if any
          rm -f mychart-*.tgz
          helm package mychart --destination .

      - name: Regenerate index.yaml
        run: |
          helm repo index . --url https://gal-halevi.github.io/helm-charts/

      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add mychart-*.tgz index.yaml

          # If there are no changes, don't commit
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update Helm chart package and index"
          git push origin HEAD:main
